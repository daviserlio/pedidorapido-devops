# Orquestração dos serviços: frontend, backend e banco de dados
networks:
  pedidorapido-net:
    driver: bridge

volumes:
  postgres-data:

services:

  db:
    image: postgres:15-alpine
    container_name: pedidorapido-db
    restart: unless-stopped
    networks:
      - pedidorapido-net
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pedidorapido-backend
    restart: unless-stopped
    networks:
      - pedidorapido-net
    ports:
      - "${BACKEND_PORT}:3001"
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT:        3001
      DB_HOST:     db
      DB_PORT:     5432
      DB_NAME:     ${DB_NAME}
      DB_USER:     ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      CORS_ORIGIN: http://localhost:${FRONTEND_PORT}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:${BACKEND_PORT}
    container_name: pedidorapido-frontend
    restart: unless-stopped
    networks:
      - pedidorapido-net
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend